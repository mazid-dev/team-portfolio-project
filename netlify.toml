# ============================================
# NETLIFY CONFIGURATION
# ============================================

[build]
  publish = "."

# ===== Redirects =====
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ===== Headers =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ===== Build Environment =====
[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
