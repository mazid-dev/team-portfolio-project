# ============================================
# NETLIFY CONFIGURATION FILE
# ============================================

[build]
  publish = "."

# ===== REDIRECTS =====
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ===== HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ===== BUILD ENVIRONMENT =====
[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"

# ===== DEPLOY NOTIFICATIONS =====
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# ===== FORMS =====
[build.processing.forms]
  allow_domains = ["*"]
