name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ===== BUILD & TEST JOB =====
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install HTML Validator
      run: npm install -g html-validator-cli
    
    - name: Validate HTML
      run: html-validator --file=index.html --verbose || true
    
    - name: Check CSS with Stylelint
      run: |
        npm install -g stylelint stylelint-config-standard
        stylelint css/*.css --allow-empty-input || true
    
    - name: Check JavaScript with ESLint
      run: |
        npm install -g eslint
        eslint js/*.js --allow-empty-input || true
    
    - name: Create .nojekyll file
      run: touch .nojekyll
    
    - name: List files for debugging
      run: ls -la
    
    - name: Build Status
      run: echo "✅ Build successful!"
    
    # ===== DEPLOY TO NETLIFY =====
    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v2.0
      with:
        publish-dir: '.'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      timeout-minutes: 1

  # ===== TEST JOB =====
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Check for broken links
      run: |
        npm install -g broken-link-checker
        blc index.html --recursive --ordered || true

  # ===== SECURITY JOB =====
  security:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Run Security Audit
      run: |
        npm audit --production --audit-level=high || true

  # ===== NOTIFICATION JOB =====
  notification:
    runs-on: ubuntu-latest
    needs: [build, test, security]
    if: always()
    
    steps:
    - name: Send Status Notification
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ needs.build.result }}';
          const statusEmoji = status === 'success' ? '✅' : '❌';
          console.log(`${statusEmoji} Deployment Status: ${status}`);
          
          if (status === 'success') {
            console.log('🎉 Deployment successful!');
          } else {
            console.log('⚠️ Deployment failed. Please check the logs.');
          }
